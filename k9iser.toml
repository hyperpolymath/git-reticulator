#
# k9iser manifest for git-reticulator
# Generates K9 contracts from repo configuration files.
# git-reticulator is a semantic lattice builder for git repos (Rust + actix-web)

[project]
name = "git-reticulator"
safety_tier = "yard"

[[source]]
path = "Cargo.toml"
type = "cargo"
output = "generated/k9iser/cargo-manifest.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[source]]
path = ".github/workflows/codeql.yml"
type = "workflow"
output = "generated/k9iser/ci-codeql.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "services.api.environment contains 'VERISIMDB_URL'"
severity = "warn"

[[constraint]]
rule = "workflows includes hypatia-scan"
severity = "error"

[[constraint]]
rule = "build.tls_enabled is true in production profile"
severity = "warn"
